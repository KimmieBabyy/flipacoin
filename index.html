<!DOCTYPE html>
<html>
<head>
  <title>Flip a Coin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #fff1cc, #ffd7e8, #eee0ff);
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      font-size: 26px;
      animation: sparkle 3s infinite ease-in-out;
      opacity: 0.7;
    }

    .s1 { top: 12%; left: 14%; }
    .s2 { top: 18%; right: 16%; animation-delay: .7s; }
    .s3 { bottom: 15%; left: 18%; animation-delay: 1.4s; }
    .s4 { bottom: 18%; right: 14%; animation-delay: 2s; }

    @keyframes sparkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: .4; }
      50% { transform: scale(1.4) rotate(20deg); opacity: 1; }
    }

    .card {
      background: rgba(255,255,255,.88);
      padding: 35px 25px;
      border-radius: 32px;
      width: 85%;
      max-width: 360px;
      box-shadow: 0 14px 35px rgba(0,0,0,.15);
      z-index: 1;
    }

    h1 {
      color: #9a6a2f;
      font-size: 36px;
      margin-bottom: 8px;
    }

    p {
      color: #9a6a2f;
      margin-bottom: 25px;
    }

    .coin-wrap {
      position: relative;
      height: 180px;
    }

    .coin {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle at 30% 25%, #fff7b8, #f1c94b, #c58a1f);
      border: 7px solid #a87518;
      border-radius: 50%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      font-weight: bold;
      color: #8a5a00;
      box-shadow: inset 0 0 18px rgba(255,255,255,.7), 0 14px 25px rgba(0,0,0,.22);
      cursor: pointer;
      user-select: none;
    }

    .coin::after {
      content: "";
      position: absolute;
      width: 115px;
      height: 115px;
      border: 3px dashed rgba(138,90,0,.35);
      border-radius: 50%;
    }

    .shadow {
      width: 100px;
      height: 18px;
      background: rgba(0,0,0,.18);
      border-radius: 50%;
      margin: 8px auto 0;
      filter: blur(2px);
    }

    .flipping {
      animation: toss 1.8s ease-in-out;
    }

    .shadow-flip {
      animation: shadow 1.8s ease-in-out;
    }

    @keyframes toss {
      0% { transform: translateY(0) rotateY(0deg) scale(1); }
      25% { transform: translateY(-55px) rotateY(720deg) scale(.95); }
      50% { transform: translateY(-95px) rotateY(1440deg) scale(.9); }
      75% { transform: translateY(-45px) rotateY(2160deg) scale(.96); }
      90% { transform: translateY(8px) rotateY(2600deg) scale(1.04); }
      100% { transform: translateY(0) rotateY(2880deg) scale(1); }
    }

    @keyframes shadow {
      0%, 100% { transform: scale(1); opacity: .18; }
      50% { transform: scale(.55); opacity: .08; }
      90% { transform: scale(1.15); opacity: .22; }
    }

    button {
      background: #c28a3a;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 8px 18px rgba(154,106,47,.25);
    }

    #result {
      margin-top: 25px;
      font-size: 34px;
      font-weight: bold;
      color: #9a6a2f;
      min-height: 45px;
      opacity: 0;
      transition: opacity .3s ease;
    }

    #result.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="sparkle s1">✨</div>
  <div class="sparkle s2">⭐</div>
  <div class="sparkle s3">✨</div>
  <div class="sparkle s4">⭐</div>

  <div class="card">
    <h1>Flip a Coin</h1>
    <p>Tap the coin to let fate decide ✨</p>

    <div class="coin-wrap">
      <div id="coin" class="coin" onclick="flipCoin()">?</div>
      <div id="shadow" class="shadow"></div>
    </div>

    <button onclick="flipCoin()">Flip Coin</button>

    <div id="result"></div>
  </div>

  <script>
    var isFlipping = false;

    function flipCoin() {
      if (isFlipping) return;

      isFlipping = true;

      var coin = document.getElementById("coin");
      var result = document.getElementById("result");
      var shadow = document.getElementById("shadow");

      result.textContent = "";
      result.classList.remove("show");

      coin.classList.remove("flipping");
      shadow.classList.remove("shadow-flip");

      void coin.offsetWidth;

      coin.classList.add("flipping");
      shadow.classList.add("shadow-flip");

      var i = 0;
      var switching = setInterval(function() {
        coin.textContent = i % 2 === 0 ? "H" : "T";
        i++;
      }, 90);

      setTimeout(function() {
        clearInterval(switching);

        var answer = Math.random() < 0.5 ? "HEADS" : "TAILS";

        coin.textContent = answer === "HEADS" ? "H" : "T";
        result.textContent = answer + "!";
        result.classList.add("show");

        if (navigator.vibrate) {
          navigator.vibrate(80);
        }

        isFlipping = false;
      }, 1800);
    }
  </script>
</body>
</html>
