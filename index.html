<!DOCTYPE html>
<html>
<head>
  <title>Flip a Coin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #fff1cc, #ffd7e8, #eee0ff);
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card {
      background: white;
      padding: 35px 25px;
      border-radius: 30px;
      width: 85%;
      max-width: 360px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    }

    h1 {
      color: #9a6a2f;
      font-size: 34px;
    }

    p {
      color: #9a6a2f;
    }

    .coin {
      width: 150px;
      height: 150px;
      background: gold;
      border: 6px solid #b8860b;
      border-radius: 50%;
      margin: 25px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 55px;
      font-weight: bold;
      color: #8a5a00;
    }

    .flip {
      animation: flip 1.5s ease-in-out;
    }

    @keyframes flip {
      0% { transform: rotateY(0deg) translateY(0); }
      25% { transform: rotateY(720deg) translateY(-50px); }
      50% { transform: rotateY(1440deg) translateY(-80px); }
      75% { transform: rotateY(2160deg) translateY(-40px); }
      100% { transform: rotateY(2880deg) translateY(0); }
    }

    button {
      background: #c28a3a;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: bold;
    }

    #result {
      margin-top: 25px;
      font-size: 32px;
      font-weight: bold;
      color: #9a6a2f;
      min-height: 40px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Flip a Coin</h1>
    <p>Tap to let fate decide ✨</p>

    <div id="coin" class="coin">?</div>

    <button onclick="flipCoin()">Flip Coin</button>

    <div id="result"></div>
  </div>

  <script>
    function flipCoin() {
      var coin = document.getElementById("coin");
      var result = document.getElementById("result");

      result.textContent = "";

      coin.classList.remove("flip");
      void coin.offsetWidth;
      coin.classList.add("flip");

      var count = 0;
      var switching = setInterval(function() {
        if (coin.textContent === "H") {
          coin.textContent = "T";
        } else {
          coin.textContent = "H";
        }
        count++;
      }, 100);

      setTimeout(function() {
        clearInterval(switching);

        var answer = Math.random() < 0.5 ? "HEADS" : "TAILS";

        if (answer === "HEADS") {
          coin.textContent = "H";
        } else {
          coin.textContent = "T";
        }

        result.textContent = answer + "!";
      }, 1500);
    }
  </script>
</body>
</html>
